<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Translator - AI Powered Translation Tool</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background Decorative Blur Blobs -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6 6-6"/><path d="m4 14 6-6 8 8"/></svg>
                </div>
                <h1>Universal<span>Translate</span></h1>
            </div>
            <div class="header-controls">
                <button id="history-toggle" class="icon-btn" title="Translation History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </button>
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <!-- Sun Icon (shown in dark mode) -->
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <!-- Moon Icon (shown in light mode) -->
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Glass card container -->
            <div class="translator-card">
                <!-- Dropdowns & Swapping Controls -->
                <div class="controls-row">
                    <div class="select-wrapper">
                        <select id="source-lang-select" aria-label="Source Language">
                            <option value="auto">Auto-Detect Language</option>
                        </select>
                        <div class="select-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>

                    <button id="swap-langs-btn" class="swap-btn" title="Swap Languages">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H9"/><path d="m8 21-4-4 4-4"/><path d="M4 17h11"/></svg>
                    </button>

                    <div class="select-wrapper">
                        <select id="target-lang-select" aria-label="Target Language">
                        </select>
                        <div class="select-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Text Boxes Layout -->
                <div class="text-boxes-container">
                    <!-- Source Box -->
                    <div class="text-box-wrapper source-wrapper">
                        <div class="box-header">
                            <span class="detected-badge" id="detected-badge" style="display: none;">Detected: English</span>
                            <button id="clear-input-btn" class="clear-btn" title="Clear input text">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            </button>
                        </div>
                        <textarea id="source-text" placeholder="Type or paste text here to translate..."></textarea>
                        
                        <div class="box-footer">
                            <div class="action-buttons">
                                <button id="speech-input-btn" class="action-btn" title="Speech to Text (Voice Input)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                                </button>
                                <button id="read-source-btn" class="action-btn" title="Read Aloud (Text to Speech)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                </button>
                            </div>
                            <span class="char-counter"><span id="char-count">0</span> / 5000</span>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="panel-divider"></div>

                    <!-- Target Box -->
                    <div class="text-box-wrapper target-wrapper">
                        <div class="skeleton-loader" id="skeleton-loader">
                            <div class="skeleton-line line-1"></div>
                            <div class="skeleton-line line-2"></div>
                            <div class="skeleton-line line-3"></div>
                        </div>
                        
                        <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
                        
                        <div class="box-footer">
                            <div class="action-buttons">
                                <button id="copy-btn" class="action-btn" title="Copy Translation">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                </button>
                                <button id="read-target-btn" class="action-btn" title="Read Aloud (Text to Speech)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                </button>
                            </div>
                            <span id="copy-toast-mini" class="mini-alert">Copied!</span>
                        </div>
                    </div>
                </div>

                <!-- Translate trigger -->
                <div class="translate-action-row">
                    <button id="translate-btn" class="translate-btn-main">
                        <span>Translate Text</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Translation History Panel -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <h3>Translation History</h3>
                <button id="close-history" class="icon-btn" title="Close Panel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                </button>
            </div>
            <div class="history-list" id="history-list">
                <div class="no-history-msg">No translation history yet. Your translations will be saved here locally.</div>
            </div>
            <div class="history-footer">
                <button id="clear-history-btn" class="text-btn">Clear All History</button>
            </div>
        </aside>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toast-container"></div>

        <footer>
            <p>&copy; 2026 UniversalTranslate. Built with modern Vanilla JS & Glassmorphism. Runs locally in VS Code.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
